<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水墨畫 AR 互動體驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'PingFang TC', sans-serif;
        }

        #video-element {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        #ink-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .start-btn {
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <video id="video-element" autoplay playsinline muted></video>
    <canvas id="bg-canvas"></canvas>
    <canvas id="ink-canvas"></canvas>

    <div id="ui-layer">
        <div id="start-screen" class="flex flex-col items-center">
            <h1 class="text-3xl font-bold text-white mb-6">水墨幻境 AR</h1>
            <button id="start-btn" class="start-btn bg-white/20 text-white px-8 py-4 rounded-full font-bold hover:bg-white/40 transition">開啟相機並凍結畫作</button>
        </div>
    </div>

    <script>const video = document.getElementById('video-element');
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const inkCanvas = document.getElementById('ink-canvas');
        const inkCtx = inkCanvas.getContext('2d');

        let isARRunning = false;
        let audioCtx; // 音訊上下文
        const spriteImage = new Image();
        spriteImage.src = 'Sprite.png';
        const totalFrames = 8;
        let frameWidth = 0, frameHeight = 0;
        spriteImage.onload = () => { frameWidth = spriteImage.width / totalFrames; frameHeight = spriteImage.height; };

        let inkPeople = [];
        const MAX_PEOPLE = 700;
        let isVanishing = false;
        let vanishStartTime = 0;
        let lastSpawnTime = 0;

        // 初始化音效 (鳥叫聲與微風聲)
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            playNatureSound();
        }

        function playNatureSound() {
            if (!isARRunning) return;
            // 隨機播放鳥叫 (高頻短音)
            if (Math.random() > 0.6) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200 + Math.random() * 800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
            // 環境風聲 (微細白噪聲)
            const bufferSize = audioCtx.sampleRate * 1;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            const noiseGain = audioCtx.createGain();
            noise.buffer = buffer;
            noiseGain.gain.value = 0.01;
            noise.connect(noiseGain).connect(audioCtx.destination);
            noise.start(); noise.stop(audioCtx.currentTime + 1);
            setTimeout(playNatureSound, 1500 + Math.random() * 2000);
        }

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(stream => video.srcObject = stream);

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            bgCanvas.width = video.videoWidth;
            bgCanvas.height = video.videoHeight;
            bgCtx.drawImage(video, 0, 0, bgCanvas.width, bgCanvas.height);
            video.style.display = 'none';

            isARRunning = true;
            initAudio(); // 確保使用者點擊後才啟動音訊
            inkCanvas.width = window.innerWidth;
            inkCanvas.height = window.innerHeight;
            requestAnimationFrame(animate);
        });

        function animate(time) {
            if (!isARRunning) return;
            requestAnimationFrame(animate);
            inkCtx.clearRect(0, 0, inkCanvas.width, inkCanvas.height);

            if (!isVanishing) {
                if (inkPeople.length < MAX_PEOPLE) {
                    if (time - lastSpawnTime > 15) {
                        spawnPerson();
                        lastSpawnTime = time;
                    }
                } else {
                    isVanishing = true;
                    vanishStartTime = time;
                }
            } else {
                const elapsed = time - vanishStartTime;
                const progress = Math.min(elapsed / 5000, 1);
                const targetCount = Math.floor(MAX_PEOPLE * (1 - progress));
                if (inkPeople.length > targetCount) {
                    inkPeople.splice(0, inkPeople.length - targetCount);
                }
            }

            inkPeople.forEach(p => {
                p.x += (p.targetX - p.x) * 0.05;
                p.y += (p.targetY - p.y) * 0.05;
                if (Math.abs(p.targetX - p.x) < 5) p.targetX = Math.random() * inkCanvas.width;
                if (Math.abs(p.targetY - p.y) < 5) p.targetY = Math.random() * inkCanvas.height;
                const frame = (Math.floor(time / 100) + p.frameOffset) % totalFrames;
                const direction = p.targetX > p.x ? 1 : -1;
                inkCtx.save();
                inkCtx.translate(p.x, p.y);
                inkCtx.scale(direction, 1);
                inkCtx.drawImage(spriteImage, frame * frameWidth, 0, frameWidth, frameHeight, -20, -20, 40, 40);
                inkCtx.restore();
            });
        }

        function spawnPerson() {
            inkPeople.push({
                x: Math.random() * inkCanvas.width,
                y: Math.random() * inkCanvas.height,
                targetX: Math.random() * inkCanvas.width,
                targetY: Math.random() * inkCanvas.height,
                frameOffset: Math.floor(Math.random() * totalFrames)
            });
        }</script>
</body>
</html>
